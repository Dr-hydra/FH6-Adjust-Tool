<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FH6 Telemetry</title>
  <link rel="stylesheet" href="./telemetry-dashboard.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>遥测分析</h1>
        <div id="statusText" class="muted">未连接</div>
      </div>
      <div class="connection">
        <label>
          <span>地址</span>
          <input id="hostInput" value="127.0.0.1" spellcheck="false">
        </label>
        <label>
          <span>端口</span>
          <input id="portInput" value="5400" inputmode="numeric">
        </label>
        <button id="startBtn" class="primary">开始</button>
        <button id="stopBtn">停止</button>
        <button id="contextBtn">同步调校</button>
        <button id="gateBtn">标记起终点</button>
      </div>
    </header>

    <section class="metrics">
      <article>
        <span>速度</span>
        <strong id="speedValue">0</strong>
        <small>km/h</small>
      </article>
      <article>
        <span>转速</span>
        <strong id="rpmValue">0</strong>
        <small>rpm</small>
      </article>
      <article>
        <span>档位</span>
        <strong id="gearValue">N</strong>
        <small id="inputValue">油 0% / 刹 0%</small>
      </article>
      <article>
        <span>调校</span>
        <strong id="tuneValue">未命名</strong>
        <small id="carValue">未选择车辆</small>
      </article>
      <article>
        <span>当前圈</span>
        <strong id="currentLapValue">--</strong>
        <small id="gameLapValue">游戏计时</small>
      </article>
    </section>

    <section class="workspace">
      <div class="main-stack">
        <article class="panel route-panel">
          <div class="panel-title">
            <h2>路线</h2>
            <div class="replay-tools">
              <span class="legend-chip slow">低速</span>
              <span class="legend-chip fast">高速</span>
              <button id="playReplayBtn">回放</button>
              <input id="replaySlider" type="range" min="0" max="0" value="0">
            </div>
          </div>
          <canvas id="routeCanvas" width="960" height="520"></canvas>
        </article>

        <article class="panel data-panel">
          <div class="panel-title">
            <h2>数据复盘</h2>
            <span id="sampleCountValue" class="panel-note">0 样本</span>
          </div>
          <div class="data-grid">
            <section class="detail-grid">
              <div><span>功率</span><strong id="powerValue">--</strong><small>kW</small></div>
              <div><span>扭矩</span><strong id="torqueValue">--</strong><small>Nm</small></div>
              <div><span>增压</span><strong id="boostValue">--</strong><small>psi</small></div>
              <div><span>燃油</span><strong id="fuelValue">--</strong><small>%</small></div>
              <div><span>横向 G</span><strong id="latGValue">--</strong><small>g</small></div>
              <div><span>纵向 G</span><strong id="longGValue">--</strong><small>g</small></div>
              <div><span>前胎温</span><strong id="frontTempValue">--</strong><small>deg C</small></div>
              <div><span>后胎温</span><strong id="rearTempValue">--</strong><small>deg C</small></div>
            </section>

            <section class="bars">
              <div class="bar-row">
                <span>油门</span>
                <div class="bar-track"><i id="throttleBar"></i></div>
                <em id="throttleText">0%</em>
              </div>
              <div class="bar-row">
                <span>刹车</span>
                <div class="bar-track danger"><i id="brakeBar"></i></div>
                <em id="brakeText">0%</em>
              </div>
              <div class="bar-row">
                <span>转向</span>
                <div class="bar-track signed"><i id="steerBar"></i></div>
                <em id="steerText">0%</em>
              </div>
              <div class="bar-row">
                <span>综合滑移</span>
                <div class="bar-track warn"><i id="slipBar"></i></div>
                <em id="slipText">0.00</em>
              </div>
              <div class="bar-row">
                <span>悬挂压缩</span>
                <div class="bar-track"><i id="suspensionBar"></i></div>
                <em id="suspensionText">0%</em>
              </div>
            </section>
          </div>
          <canvas id="dataCanvas" width="960" height="180"></canvas>
        </article>
      </div>

      <aside class="stack">
        <article class="panel">
          <div class="panel-title">
            <h2>圈速</h2>
            <button id="refreshBtn">刷新</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>模式</th>
                  <th>圈</th>
                  <th>时间</th>
                  <th>调校</th>
                </tr>
              </thead>
              <tbody id="lapsBody"></tbody>
            </table>
          </div>
        </article>

        <article class="panel">
          <div class="panel-title">
            <h2>调校对比</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>调校</th>
                  <th>最佳</th>
                  <th>圈数</th>
                </tr>
              </thead>
              <tbody id="compareBody"></tbody>
            </table>
          </div>
        </article>

        <article class="panel">
          <div class="panel-title">
            <h2>问题标记</h2>
            <button id="issueBtn">标记</button>
          </div>
          <ul id="issuesList" class="issues"></ul>
        </article>
      </aside>
    </section>
  </main>
  <script src="./telemetry-dashboard.js"></script>
</body>
</html>
